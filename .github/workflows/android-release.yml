name: Android CI/CD - Build & Sign APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # यदि gradlew रूट पर नहीं है, तो यह कमांड फेल नहीं होगी और उसे ढूंढकर परमिशन देगी
    - name: Grant execute permission for gradlew
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
        elif [ -f "./app/gradlew" ]; then
          chmod +x ./app/gradlew
        else
          echo "gradlew not found in expected paths, checking repository layout..."
          find . -name "gradlew" -exec chmod +x {} +
        fi

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > app/my-release-key.jks

    # यदि gradlew सब-फ़ोल्डर में है, तो यह कमांड उसे ऑटोमैटिकली डिटेक्ट कर के रन करेगी
    - name: Build Release APK
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleRelease
        else
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew executable could not be found anywhere."
            exit 1
          fi
          cd $(dirname "$GRADLEW_PATH")
          ./gradlew assembleRelease
        fi

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        singlePop: true
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Upload APK to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Signed-NexusCore-APK
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
